<div class="card shadow-sm m-4">
    <div class="flex justify-content-between align-items-center p-3">
        <h3><i class="pi pi-users mr-2"></i>Directorio de Proveedores</h3>
        <p-button label="Agregar Proveedor" icon="pi pi-user-plus"></p-button>
    </div>

    <p-table [value]="proveedores" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                <th>RUC / ID</th>
                <th>Razón Social</th>
                <th>Contacto</th>
                <th>Teléfono</th>
                <th>Rubro</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-p>
            <tr>
                <td>{{ p.ruc }}</td>
                <td>{{ p.nombre }}</td>
                <td>{{ p.contacto }}</td>
                <td>{{ p.telf }}</td>
                <td><p-tag [value]="p.rubro" severity="secondary"></p-tag></td>
            </tr>
        </ng-template>
    </p-table>
</div>
