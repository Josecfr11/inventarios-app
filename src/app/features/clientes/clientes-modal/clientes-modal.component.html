<div class="container-fluid p-2">
  <form [formGroup]="clientesForm" (ngSubmit)="guardar()">

    <h5 class="text-primary fw-bold mb-3 border-bottom pb-2">Información del Cliente</h5>

    <div class="row g-3 mb-4">
      <div class="col-md-8">
        <label class="block font-bold mb-1">Nombre / Razón Social <span class="text-danger">*</span></label>
        <input type="text" pInputText class="w-100" formControlName="nombre" placeholder="Nombre de la empresa o persona" />
        <small class="text-danger" *ngIf="clientesForm.get('nombre')?.invalid && clientesForm.get('nombre')?.touched">El nombre es obligatorio.</small>
      </div>

      <div class="col-md-4">
        <label class="block font-bold mb-1">Tipo de Cliente <span class="text-danger">*</span></label>
        <p-dropdown [options]="tiposCliente" formControlName="tipo" optionLabel="label" optionValue="value"
                    appendTo="body" styleClass="w-100" class="w-100"></p-dropdown>
      </div>

      <div class="col-md-6">
        <label class="block font-bold mb-1">Persona de Contacto</label>
        <input type="text" pInputText class="w-100" formControlName="contacto" placeholder="¿Con quién nos comunicamos?" />
      </div>

      <div class="col-md-6">
        <label class="block font-bold mb-1">Teléfono <span class="text-danger">*</span></label>
        <input type="text" pInputText class="w-100" formControlName="telefono" placeholder="Solo números" />
      </div>

      <div class="col-md-12">
        <label class="block font-bold mb-1">Correo Electrónico</label>
        <input type="email" pInputText class="w-100" formControlName="email" placeholder="ejemplo@correo.com" />
      </div>

      <div class="col-md-12">
        <label class="block font-bold mb-1">Dirección Física</label>
        <textarea rows="2" pInputTextarea class="w-100" formControlName="direccion" placeholder="Calle, Número, Ciudad, Estado"></textarea>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col d-flex justify-content-end gap-2">
        <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-secondary p-button-text" (onClick)="ref.close()"></p-button>
        <p-button type="submit" [label]="esEdicion ? 'Actualizar Cliente' : 'Guardar Cliente'" icon="pi pi-save" [disabled]="clientesForm.invalid"></p-button>
      </div>
    </div>

  </form>
</div>
