<p-toast></p-toast>

<div class="p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="m-0 font-bold"><i class="pi pi-shopping-cart mr-2 text-primary"></i>Órdenes de Compra</h2>
      <p class="text-500 text-sm">Gestión de suministros y reabastecimiento</p>
    </div>
    <p-button label="Nueva Compra" icon="pi pi-plus" (onClick)="abrirModal()" severity="primary" [rounded]="true"></p-button>
  </div>

  <p-table [value]="compras" [paginator]="true" [rows]="10" styleClass="p-datatable-striped shadow-1 border-round-xl overflow-hidden">
    <ng-template pTemplate="header">
      <tr>
        <th>N° ORDEN</th>
        <th>PROVEEDOR</th>
        <th>FECHA</th>
        <th class="text-right">TOTAL</th>
        <th class="text-center">ESTADO</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-compra>
      <tr>
        <td class="font-medium text-blue-600">{{compra.numeroOrden}}</td>
        <td>{{compra.proveedorNombre}}</td>
        <td>{{compra.fechaRegistro | date:'dd/MM/yyyy HH:mm'}}</td>
        <td class="text-right font-bold text-success">{{compra.total | currency:'USD'}}</td>
        <td class="text-center">
          <p-tag [value]="compra.estado" [severity]="getSeverity(compra.estado)" [rounded]="true"></p-tag>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center p-4 text-muted">No hay compras registradas en el sistema.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
